<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Saver - YouTube Video Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #FF4754;
            --bg: #ffffff;
            --text: #2d3436;
            --card-bg: #f8f9fa;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        .dark-mode {
            --bg: #2d3436;
            --text: #ffffff;
            --card-bg: #3b4142;
            --shadow: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .theme-toggle {
            background: var(--primary);
            border: none;
            padding: 0.8rem;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .theme-toggle:hover {
            transform: rotate(180deg);
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--primary);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text);
        }

        button {
            padding: 1rem 2rem;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 12px var(--shadow);
            display: none;
        }

        .thumbnail-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .thumbnail {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
        }

        .quality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .quality-btn {
            background: var(--primary);
            padding: 0.8rem;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 YT Saver</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </header>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="YouTube URL डालें...">
            <button onclick="fetchVideoInfo()">प्रोसेस करें</button>
        </div>

        <div class="loader" id="loader"></div>

        <div class="video-card" id="result">
            <div class="thumbnail-container">
                <img src="" class="thumbnail" id="thumbnail">
                <span class="duration" id="duration"></span>
            </div>
            
            <h2 id="title"></h2>
            <p id="channel"></p>

            <div class="quality-grid" id="qualityGrid"></div>
            
            <button onclick="downloadMP3()" class="mp3-btn">🎵 MP3 डाउनलोड करें</button>
        </div>
    </div>

    <script>
        let videoData = null;

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        // Load Theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        async function fetchVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            const videoId = extractVideoId(url);
            
            if (!videoId) {
                alert('⚠️ कृपया सही YouTube URL डालें');
                return;
            }

            showLoader(true);
            
            try {
                const response = await fetch(`/api/info?videoId=${videoId}`);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                videoData = data;
                showVideoDetails(data);
                showLoader(false);
            } catch (error) {
                alert('❌ Error: ' + error.message);
                showLoader(false);
            }
        }

        function showVideoDetails(data) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('title').textContent = data.title;
            document.getElementById('channel').textContent = `चैनल: ${data.channel}`;
            document.getElementById('thumbnail').src = data.thumbnail;
            document.getElementById('duration').textContent = formatDuration(data.duration);
            
            const qualityGrid = document.getElementById('qualityGrid');
            qualityGrid.innerHTML = data.formats
                .filter(f => f.qualityLabel)
                .map(format => `
                    <div class="quality-btn" onclick="download('${format.itag}')">
                        ${format.qualityLabel}<br>
                        <small>${format.container}</small>
                    </div>
                `).join('');
        }

        function download(itag) {
            const format = videoData.formats.find(f => f.itag == itag);
            window.open(`/download?videoId=${videoData.id}&itag=${itag}&title=${encodeURIComponent(format.title)}`, '_blank');
        }

        function downloadMP3() {
            window.open(`/download/mp3?videoId=${videoData.id}&title=${encodeURIComponent(videoData.title)}`, '_blank');
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
